<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תפסנו אותך! - משחק קבוצתי</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for JSX support -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
      "firebase/app": "https://esm.sh/firebase@10.8.0/app",
      "firebase/auth": "https://esm.sh/firebase@10.8.0/auth",
      "firebase/firestore": "https://esm.sh/firebase@10.8.0/firestore"
    }
  }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&display=swap');
    body { font-family: 'Assistant', sans-serif; }
    .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body class="bg-slate-900 m-0 p-0 overflow-x-hidden">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp, getApps } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, arrayUnion } from 'firebase/firestore';
    import { Users, Play, LogIn, CheckCircle2, UserPlus, Crown, Sparkles, Loader2, FileText, PlusCircle } from 'lucide-react';

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDDBp3m79hJHoG_Kv2lWCW6OR4TjdbjM-Q",
      authDomain: "tfsno-otha.firebaseapp.com",
      projectId: "tfsno-otha",
      storageBucket: "tfsno-otha.firebasestorage.app",
      messagingSenderId: "563554372994",
      appId: "1:563554372994:web:a2c70d13524887fa4a539b"
    };

    const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = "gotcha-tamar"; 
    const geminiKey = "AIzaSyChva4-SmvcMOEVW-fyx4ojjY5K7LSV_UQ";

    const GROUP_COLORS = [
      { name: 'אדום', bg: 'bg-red-500', text: 'text-red-500', border: 'border-red-500', lightBg: 'bg-red-50' },
      { name: 'כחול', bg: 'bg-blue-500', text: 'text-blue-500', border: 'border-blue-500', lightBg: 'bg-blue-50' },
      { name: 'ירוק', bg: 'bg-green-500', text: 'text-green-500', border: 'border-green-500', lightBg: 'bg-green-50' },
      { name: 'צהוב', bg: 'bg-yellow-400', text: 'text-yellow-600', border: 'border-yellow-400', lightBg: 'bg-yellow-50' },
      { name: 'סגול', bg: 'bg-purple-500', text: 'text-purple-500', border: 'border-purple-500', lightBg: 'bg-purple-50' },
      { name: 'כתום', bg: 'bg-orange-500', text: 'text-orange-500', border: 'border-orange-500', lightBg: 'bg-orange-50' },
      { name: 'ורוד', bg: 'bg-pink-500', text: 'text-pink-500', border: 'border-pink-500', lightBg: 'bg-pink-50' },
      { name: 'טורקיז', bg: 'bg-teal-500', text: 'text-teal-500', border: 'border-teal-500', lightBg: 'bg-teal-50' }
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState(null); 
      const [roomCode, setRoomCode] = useState('');
      const [roomData, setRoomData] = useState(null);
      const [studentName, setStudentName] = useState('');
      const [error, setError] = useState('');
      const [isLoading, setIsLoading] = useState(true);
      const [adminInput, setAdminInput] = useState('');
      const [topicInput, setTopicInput] = useState('');
      const [sourceTextInput, setSourceTextInput] = useState('');
      const [groupSizeInput, setGroupSizeInput] = useState('4');

      useEffect(() => {
        signInAnonymously(auth).catch(e => setError("שגיאת חיבור"));
        return onAuthStateChanged(auth, u => { setUser(u); setIsLoading(false); });
      }, []);

      useEffect(() => {
        if (!user || !roomCode || role === 'selection') return;
        return onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode), (s) => {
          if (s.exists()) setRoomData(s.data());
          else if (role === 'student') { setError("החדר נסגר."); setRole('selection'); }
        });
      }, [user, roomCode, role]);

      const createRoom = async () => {
        setIsLoading(true);
        const code = Math.floor(1000 + Math.random() * 9000).toString();
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code), {
          status: 'lobby', teacherId: user.uid, players: [], groups: [], wordSets: []
        });
        setRoomCode(code);
        setIsLoading(false);
      };

      const joinRoom = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);
        const s = await getDoc(roomRef);
        if (!s.exists()) { setError("חדר לא קיים"); setIsLoading(false); return; }
        await updateDoc(roomRef, { players: arrayUnion({ id: user.uid, name: studentName, groupId: null }) });
        setRole('student');
        setIsLoading(false);
      };

      const generateContent = async () => {
        setIsLoading(true);
        const prompt = `Generate 10 sets of 4 words in Hebrew for topic: ${topicInput || 'general'}. One word in each set is an intruder. Return JSON array: [{"words":["a","b","c","intruder"],"intruder":"intruder"}]`;
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
          });
          const data = await res.json();
          const parsed = JSON.parse(data.candidates[0].content.parts[0].text);
          return parsed.map((s, i) => ({ id: i, words: s.words.sort(() => Math.random() - 0.5), intruder: s.intruder, status: 'active' }));
        } catch (e) {
          return [{ id: 0, words: ["תפוח","בננה","מלפפון","אפרסק"], intruder: "מלפפון", status: "active" }];
        }
      };

      const start = async () => {
        setIsLoading(true);
        const sets = await generateContent();
        const players = [...roomData.players].sort(() => Math.random() - 0.5);
        const size = parseInt(groupSizeInput);
        const groups = [];
        for (let i = 0; i < Math.ceil(players.length / size); i++) {
          const members = players.slice(i * size, (i + 1) * size);
          groups.push({ id: `g${i}`, name: GROUP_COLORS[i % 8].name, colorIndex: i % 8, score: 0, members: members.map(m => m.name) });
          members.forEach(m => m.groupId = `g${i}`);
        }
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode), {
          status: 'playing', players, groups, wordSets: sets, topic: topicInput || 'כללי'
        });
        setIsLoading(false);
      };

      const solve = async (setId, word, intruder) => {
        if (word !== intruder) return;
        const p = roomData.players.find(p => p.id === user.uid);
        const newSets = [...roomData.wordSets];
        newSets[setId].status = 'solved';
        newSets[setId].solvedBy = p.groupId;
        const newGroups = [...roomData.groups];
        newGroups.find(g => g.id === p.groupId).score += 1;
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode), { wordSets: newSets, groups: newGroups });
      };

      if (isLoading && !roomData) return <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white"><Loader2 className="animate-spin w-12 h-12" /></div>;

      if (!role) return (
        <div className="min-h-screen flex flex-col bg-slate-900 text-white font-Assistant" dir="rtl">
          <div className="bg-white p-4 shadow-xl flex justify-between items-center border-b-4 border-sky-500">
            <img src="https://i.postimg.cc/DfxP89V0/Whats_App_Image_2026_03_18_at_11_10_41_1_removebg_preview.png" className="h-16" alt="logo" />
            <h1 className="text-2xl md:text-4xl font-black text-sky-600">המשחק שיעיר את הכיתה</h1>
          </div>
          <div className="flex-1 flex flex-col items-center justify-center gap-6 p-4">
            <button onClick={() => setRole('student_login')} className="w-full max-w-md py-6 bg-blue-600 hover:bg-blue-500 rounded-2xl text-2xl font-black flex items-center justify-center gap-4">
              <UserPlus className="w-8 h-8" /> כניסת תלמידים
            </button>
            <button onClick={() => setRole('teacher_login')} className="w-full max-w-md py-6 bg-pink-600 hover:bg-pink-500 rounded-2xl text-2xl font-black flex items-center justify-center gap-4">
              <Crown className="w-8 h-8" /> כניסת מורה
            </button>
          </div>
        </div>
      );

      if (role === 'teacher_login') return (
        <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white p-4" dir="rtl">
          <div className="bg-slate-800 p-8 rounded-3xl w-full max-w-md text-center">
            <h2 className="text-3xl font-bold mb-6">כניסת מורה</h2>
            <input type="password" placeholder="קוד (7890)" className="w-full p-4 rounded-xl text-black text-center text-xl mb-4" value={adminInput} onChange={(e) => setAdminInput(e.target.value)} />
            {error && <p className="text-red-400 mb-4">{error}</p>}
            <button onClick={() => { if (adminInput === '7890') { setRole('teacher'); createRoom(); } else setError('קוד שגוי'); }} className="w-full py-4 bg-pink-600 rounded-xl font-bold text-xl">צור משחק</button>
            <button onClick={() => setRole(null)} className="mt-4 text-slate-400">חזור</button>
          </div>
        </div>
      );

      if (role === 'student_login') return (
        <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white p-4" dir="rtl">
          <form onSubmit={joinRoom} className="bg-slate-800 p-8 rounded-3xl w-full max-w-md text-center">
            <h2 className="text-3xl font-bold mb-6">הצטרפות</h2>
            <input placeholder="קוד חדר" className="w-full p-4 rounded-xl text-black text-center text-xl mb-4" value={roomCode} onChange={(e) => setRoomCode(e.target.value)} />
            <input placeholder="השם שלך" className="w-full p-4 rounded-xl text-black text-center text-xl mb-4" value={studentName} onChange={(e) => setStudentName(e.target.value)} />
            {error && <p className="text-red-400 mb-4">{error}</p>}
            <button type="submit" disabled={isLoading} className="w-full py-4 bg-blue-600 rounded-xl font-bold text-xl">הכנס אותי</button>
            <button onClick={() => setRole(null)} type="button" className="mt-4 text-slate-400">חזור</button>
          </form>
        </div>
      );

      if (role === 'teacher' && roomData?.status === 'lobby') return (
        <div className="min-h-screen bg-slate-50 p-4 font-Assistant" dir="rtl">
          <div className="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden text-center">
            <div className="bg-indigo-600 p-8 text-white">
              <h2 className="text-2xl">קוד המשחק:</h2>
              <div className="text-6xl font-black text-yellow-300">{roomCode}</div>
            </div>
            <div className="p-8 space-y-6 text-right text-slate-800">
              <input placeholder="נושא המשחק (למשל: מילים באנגלית)" className="w-full p-4 rounded-xl border-2" value={topicInput} onChange={(e) => setTopicInput(e.target.value)} />
              <textarea placeholder="טקסט מקור (אופציונלי)" className="w-full p-4 rounded-xl border-2" value={sourceTextInput} onChange={(e) => setSourceTextInput(e.target.value)}></textarea>
              <select className="w-full p-4 rounded-xl border-2" value={groupSizeInput} onChange={(e) => setGroupSizeInput(e.target.value)}>
                {[2,3,4,5].map(n => <option key={n} value={n}>{n} בקבוצה</option>)}
              </select>
              <div className="bg-slate-100 p-4 rounded-xl">
                <h3 className="font-bold mb-2">ממתינים ({roomData.players.length}):</h3>
                <div className="flex flex-wrap gap-2">{roomData.players.map((p, i) => <span key={i} className="bg-white px-3 py-1 rounded-full shadow-sm">{p.name}</span>)}</div>
              </div>
              <button onClick={start} disabled={isLoading || roomData.players.length === 0} className="w-full py-4 bg-green-500 text-white rounded-xl font-black text-xl">התחל משחק!</button>
            </div>
          </div>
        </div>
      );

      if (role === 'student' && roomData?.status === 'lobby') return (
        <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white"><h2 className="text-3xl font-bold">מחכים למורה...</h2></div>
      );

      if (roomData?.status === 'playing') {
        const myPlayer = role === 'student' ? roomData.players.find(p => p.id === user.uid) : null;
        const myGroup = myPlayer ? roomData.groups.find(g => g.id === myPlayer.groupId) : null;
        const c = myGroup ? GROUP_COLORS[myGroup.colorIndex] : null;

        return (
          <div className="min-h-screen bg-slate-50 font-Assistant text-slate-800" dir="rtl">
            <div className={`p-4 text-white flex justify-between ${role === 'teacher' ? 'bg-indigo-600' : c?.bg}`}>
              <h1 className="text-xl font-bold">{role === 'teacher' ? 'מסך ניהול' : `קבוצה ${myGroup?.name}`}</h1>
              <div className="font-bold">{role === 'student' && `ניקוד: ${myGroup?.score}`}</div>
            </div>

            <div className="max-w-4xl mx-auto p-4">
              {role === 'teacher' && (
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                  {roomData.groups.map(g => (
                    <div key={g.id} className={`${GROUP_COLORS[g.colorIndex].lightBg} p-4 rounded-xl text-center border-2 ${GROUP_COLORS[g.colorIndex].border}`}>
                      <div className="text-3xl font-black">{g.score}</div>
                      <div className="font-bold">קבוצה {GROUP_COLORS[g.colorIndex].name}</div>
                    </div>
                  ))}
                </div>
              )}

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {roomData.wordSets.map((set, idx) => {
                  const solved = set.status === 'solved';
                  const solver = solved ? roomData.groups.find(g => g.id === set.solvedBy) : null;
                  return (
                    <div key={idx} className="bg-white p-4 rounded-xl shadow-sm border-2">
                      <div className="text-sm font-bold text-slate-400 mb-2">סט {idx + 1} {solved && `- נפתר ע"י ${solver?.name}`}</div>
                      {solved ? (
                        <div className="text-center py-4 text-xl font-bold">הפולש: <span className="text-red-500">{set.intruder}</span></div>
                      ) : (
                        <div className="grid grid-cols-2 gap-2">
                          {set.words.map((w, i) => (
                            <button key={i} onClick={() => role === 'student' && solve(idx, w, set.intruder)} className="p-3 bg-slate-100 rounded-lg hover:bg-slate-200 font-bold">{w}</button>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
