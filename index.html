<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תפסנו אותך! - משחק קבוצתי</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for JSX support -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
    }
  }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&display=swap');
    body { font-family: 'Assistant', sans-serif; }
  </style>

  <!-- מנגנון לתפיסת שגיאות והצגתן על המסך (במקום מסך שחור) -->
  <script>
    window.addEventListener('error', function(event) {
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = `
          <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; background-color: #450a0a; color: white; direction: ltr; padding: 2rem;">
            <h2 style="font-size: 2rem; margin-bottom: 1rem;">Oops! Something went wrong:</h2>
            <code style="background-color: #270303; padding: 1rem; border-radius: 0.5rem; max-width: 80%; word-wrap: break-word;">${event.message}</code>
            <p style="margin-top: 1rem; color: #fca5a5;">Please refresh the page (Ctrl + F5) and try again.</p>
          </div>
        `;
      }
    });
  </script>
</head>
<body class="bg-slate-900 m-0 p-0 overflow-x-hidden text-slate-800 font-Assistant">
  
  <div id="root">
    <!-- הודעת טעינה מעוצבת -->
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; background-color: #0f172a; color: white;">
        <h2 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; color: #38bdf8;">המשחק נטען... 🚀</h2>
        <p style="color: #cbd5e1; font-size: 1.2rem;">אנא המתינו מספר שניות.</p>
    </div>
  </div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp, getApps } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, arrayUnion } from 'firebase/firestore';
    import { Users, Play, LogIn, CheckCircle2, UserPlus, Crown, Sparkles, Loader2, FileText, PlusCircle } from 'lucide-react';

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDDBp3m79hJHoG_Kv2lWCW6OR4TjdbjM-Q",
      authDomain: "tfsno-otha.firebaseapp.com",
      projectId: "tfsno-otha",
      storageBucket: "tfsno-otha.firebasestorage.app",
      messagingSenderId: "563554372994",
      appId: "1:563554372994:web:a2c70d13524887fa4a539b"
    };

    const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = "gotcha-tamar"; 
    const geminiKey = "AIzaSyChva4-SmvcMOEVW-fyx4ojjY5K7LSV_UQ";

    const GROUP_COLORS = [
      { name: 'אדום', bg: 'bg-red-500', text: 'text-red-500', border: 'border-red-500', lightBg: 'bg-red-100' },
      { name: 'כחול', bg: 'bg-blue-500', text: 'text-blue-500', border: 'border-blue-500', lightBg: 'bg-blue-100' },
      { name: 'ירוק', bg: 'bg-green-500', text: 'text-green-500', border: 'border-green-500', lightBg: 'bg-green-100' },
      { name: 'צהוב', bg: 'bg-yellow-400', text: 'text-yellow-600', border: 'border-yellow-400', lightBg: 'bg-yellow-100' },
      { name: 'סגול', bg: 'bg-purple-500', text: 'text-purple-500', border: 'border-purple-500', lightBg: 'bg-purple-100' },
      { name: 'כתום', bg: 'bg-orange-500', text: 'text-orange-500', border: 'border-orange-500', lightBg: 'bg-orange-100' },
      { name: 'ורוד', bg: 'bg-pink-500', text: 'text-pink-500', border: 'border-pink-500', lightBg: 'bg-pink-100' },
      { name: 'טורקיז', bg: 'bg-teal-500', text: 'text-teal-500', border: 'border-teal-500', lightBg: 'bg-teal-100' }
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState(null); 
      const [roomCode, setRoomCode] = useState('');
      const [roomData, setRoomData] = useState(null);
      const [studentName, setStudentName] = useState('');
      const [error, setError] = useState('');
      const [isLoading, setIsLoading] = useState(true);
      
      const [adminInput, setAdminInput] = useState('');
      const [topicInput, setTopicInput] = useState('');
      const [sourceTextInput, setSourceTextInput] = useState('');
      const [groupSizeInput, setGroupSizeInput] = useState('4');

      useEffect(() => {
        const init = async () => {
          try {
            await signInAnonymously(auth);
          } catch (e) {
            console.error("Auth error:", e);
            setError("שגיאת חיבור למערכת. ודאו שהדומיין אושר.");
          }
        };
        init();
        return onAuthStateChanged(auth, u => { setUser(u); setIsLoading(false); });
      }, []);

      useEffect(() => {
        if (!user || !roomCode || role === 'selection') return;
        return onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode), (s) => {
          if (s.exists()) setRoomData(s.data());
          else if (role === 'student') { setError("החדר נסגר."); setRole('selection'); }
        });
      }, [user, roomCode, role]);

      const createRoom = async () => {
        setIsLoading(true);
        const code = Math.floor(1000 + Math.random() * 9000).toString();
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code), {
          status: 'lobby', teacherId: user.uid, players: [], groups: [], wordSets: []
        });
        setRoomCode(code);
        setIsLoading(false);
      };

      const joinRoom = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);
        const s = await getDoc(roomRef);
        if (!s.exists()) { setError("חדר לא קיים"); setIsLoading(false); return; }
        await updateDoc(roomRef, { players: arrayUnion({ id: user.uid, name: studentName, groupId: null }) });
        setRole('student');
        setIsLoading(false);
      };

      const generateContent = async () => {
        setIsLoading(true);
        const prompt = `Generate 10 sets of 4 words in Hebrew for topic: ${topicInput || 'general'}. One word in each set is an intruder. Return JSON array: [{"words":["a","b","c","intruder"],"intruder":"intruder"}]`;
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
          });
          const data = await res.json();
          const parsed = JSON.parse(data.candidates[0].content.parts[0].text);
          return parsed.slice(0, 10).map((s, i) => ({ id: `set_${i}`, words: s.words.sort(() => Math.random() - 0.5), intruder: s.intruder, status: 'active' }));
        } catch (e) {
          return Array.from({ length: 10 }).map((_, i) => ({ id: `set_${i}`, words: ["תפוח","בננה","מלפפון","אפרסק"].sort(() => Math.random() - 0.5), intruder: "מלפפון", status: "active" }));
        }
      };

      const start = async () => {
        setIsLoading(true);
        const sets = await generateContent();
        const players = [...roomData.players].sort(() => Math.random() - 0.5);
        const size = parseInt(groupSizeInput);
        const groups = [];
        for (let i = 0; i < Math.ceil(players.length / size); i++) {
          const members = players.slice(i * size, (i + 1) * size);
          groups.push({ id: `g${i}`, name: GROUP_COLORS[i % 8].name, colorIndex: i % 8, score: 0, members: members.map(m => m.name) });
          members.forEach(m => m.groupId = `g${i}`);
        }
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode), {
          status: 'playing', players, groups, wordSets: sets, topic: topicInput || 'כללי'
        });
        setIsLoading(false);
      };

      const solve = async (setId, word, intruder) => {
        if (word !== intruder) {
           const el = document.getElementById(`btn-${setId}-${word}`);
           if(el) { el.classList.add('bg-red-600', 'text-white'); setTimeout(() => el.classList.remove('bg-red-600', 'text-white'), 500); }
           return;
        }
        const p = roomData.players.find(p => p.id === user.uid);
        if(!p || !p.groupId) return;
        
        const newSets = [...roomData.wordSets];
        const setIndex = newSets.findIndex(s => s.id === setId);
        if(newSets[setIndex].status === 'solved') return;
        
        newSets[setIndex].status = 'solved';
        newSets[setIndex].solvedBy = p.groupId;
        
        const newGroups = [...roomData.groups];
        const groupIndex = newGroups.findIndex(g => g.id === p.groupId);
        newGroups[groupIndex].score += 1;
        
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode), { wordSets: newSets, groups: newGroups });
      };

      const startNextRound = async () => {
        setIsLoading(true);
        try {
          const wordSets = await generateContent();
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode), { wordSets: wordSets });
        } catch (err) {
          console.error(err);
        }
        setIsLoading(false);
      };

      if (isLoading && !roomData) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white">
            <Loader2 className="w-16 h-16 animate-spin text-sky-500" />
          </div>
        );
      }

      // =====================================
      // מסך ראשי
      // =====================================
      if (!role || role === 'selection') {
        return (
          <div className="min-h-[100dvh] flex flex-col relative overflow-x-hidden bg-slate-900" dir="rtl">
            <div className="w-full bg-white/95 backdrop-blur-md shadow-xl z-20 flex items-center justify-between px-4 py-3 border-b-4 border-indigo-500">
              <div className="flex-none w-20 md:w-32 flex items-center justify-start">
                <img src="https://i.postimg.cc/DfxP89V0/Whats_App_Image_2026_03_18_at_11_10_41_1_removebg_preview.png" alt="לוגו" className="h-16 md:h-20 object-contain drop-shadow-sm" />
              </div>
              <div className="flex-1 text-center">
                <h1 className="text-2xl md:text-4xl lg:text-5xl font-black tracking-wide leading-tight pt-1 px-2" style={{ color: '#0284c7', textShadow: '0px 2px 0px #0369a1, 0px 4px 0px #075985, 0px 6px 0px #082f49, 0px 8px 0px #042f2e, 0px 10px 15px rgba(0,0,0,0.6)' }}>
                  המשחק שיעיר את הכיתה שלכם
                </h1>
              </div>
              <div className="flex-none w-20 md:w-32 hidden md:block"></div>
            </div>

            <div className="flex-1 w-full relative flex flex-col items-center justify-end pb-20 px-4" style={{ backgroundImage: "url('https://i.postimg.cc/BnfLzCP6/Whats-App-Image-2026-03-31-at-17-14-32.jpg')", backgroundSize: 'cover', backgroundPosition: 'top center' }}>
              <div className="absolute inset-0 bg-slate-900/40 z-0 pointer-events-none"></div>
              <div className="flex flex-col md:flex-row gap-6 w-full max-w-5xl justify-center relative z-10 mb-8">
                <button onClick={() => setRole('student_login')} className="flex-1 py-6 px-6 bg-blue-600/90 hover:bg-blue-600 backdrop-blur-md text-white rounded-2xl font-black text-2xl shadow-2xl flex items-center justify-center gap-4 transition-transform transform hover:scale-105 border-2 border-white/20">
                  <UserPlus className="w-8 h-8" /> כניסת תלמידים
                </button>
                <button onClick={() => { setRole('teacher_login'); setError(''); setAdminInput(''); }} className="flex-1 py-6 px-6 bg-pink-600/90 hover:bg-pink-600 backdrop-blur-md text-white rounded-2xl font-black text-2xl shadow-2xl flex items-center justify-center gap-4 transition-transform transform hover:scale-105 border-2 border-white/20">
                  <Crown className="w-8 h-8" /> כניסת מורה
                </button>
              </div>
            </div>
            
            {/* זכויות יוצרים */}
            <div className="absolute bottom-2 w-full text-center text-white/80 text-sm font-bold pointer-events-none drop-shadow-md z-30">
              כל הזכויות שמורות © תמר חמאדה
            </div>
          </div>
        );
      }

      if (role === 'teacher_login') return (
        <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white p-4" dir="rtl">
          <div className="bg-slate-800 p-8 rounded-3xl w-full max-w-md text-center border border-slate-700">
            <Crown className="w-16 h-16 text-pink-400 mx-auto mb-4" />
            <h2 className="text-3xl font-bold mb-6">כניסת מורה</h2>
            <input type="password" placeholder="הכנס קוד מורה" className="w-full p-4 rounded-xl text-black text-center text-xl mb-4" value={adminInput} onChange={(e) => setAdminInput(e.target.value)} />
            {error && <p className="text-red-400 font-bold mb-4">{error}</p>}
            <button onClick={() => { if (adminInput === '7890') { setRole('teacher'); createRoom(); } else setError('קוד שגוי'); }} className="w-full py-4 bg-pink-600 hover:bg-pink-500 rounded-xl font-bold text-xl">צור משחק</button>
            <button onClick={() => setRole(null)} className="mt-6 text-slate-400 hover:text-white">חזור אחורה</button>
          </div>
        </div>
      );

      if (role === 'student_login') return (
        <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white p-4" dir="rtl">
          <form onSubmit={joinRoom} className="bg-slate-800 p-8 rounded-3xl w-full max-w-md text-center border border-slate-700">
            <UserPlus className="w-16 h-16 text-blue-400 mx-auto mb-4" />
            <h2 className="text-3xl font-bold mb-6">הצטרפות</h2>
            <input placeholder="הכנס קוד משחק" required className="w-full p-4 rounded-xl text-black text-center text-xl mb-4" value={roomCode} onChange={(e) => setRoomCode(e.target.value)} />
            <input placeholder="השם שלך" required className="w-full p-4 rounded-xl text-black text-center text-xl mb-4" value={studentName} onChange={(e) => setStudentName(e.target.value)} />
            {error && <p className="text-red-400 font-bold mb-4">{error}</p>}
            <button type="submit" disabled={isLoading} className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-xl disabled:opacity-50">הכנס אותי</button>
            <button onClick={() => setRole(null)} type="button" className="mt-6 text-slate-400 hover:text-white">חזור אחורה</button>
          </form>
        </div>
      );

      if (role === 'teacher' && roomData?.status === 'lobby') return (
        <div className="min-h-screen bg-slate-50 text-slate-900 p-4 md:p-8" dir="rtl">
          <div className="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
            <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-8 text-center text-white relative">
              <h2 className="text-3xl font-black mb-2">קוד המשחק שלכם:</h2>
              <div className="text-6xl md:text-8xl font-black tracking-wider text-yellow-300 drop-shadow-md">{roomCode}</div>
              <p className="mt-4 text-lg opacity-90">תלמידים, היכנסו למשחק והקלידו את הקוד!</p>
            </div>
            <div className="p-8">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div className="space-y-6">
                  <h3 className="text-2xl font-bold flex items-center gap-2 text-indigo-700"><FileText className="w-6 h-6" /> הגדרות המשחק</h3>
                  <div>
                    <label className="block text-sm font-bold text-slate-600 mb-2">נושא המשחק</label>
                    <input className="w-full p-4 rounded-xl border-2 border-slate-200 focus:border-indigo-500 bg-slate-50 text-lg font-medium" value={topicInput} onChange={(e) => setTopicInput(e.target.value)} placeholder="למשל: אנגלית, היסטוריה..." />
                  </div>
                  <div>
                     <label className="block text-sm font-bold text-slate-600 mb-2">טקסט מקור (אופציונלי)</label>
                     <textarea className="w-full p-4 rounded-xl border-2 border-slate-200 focus:border-indigo-500 bg-slate-50 text-base" rows="3" value={sourceTextInput} onChange={(e) => setSourceTextInput(e.target.value)} placeholder="הדבק טקסט מספר הלימוד..."></textarea>
                  </div>
                  <div>
                     <label className="block text-sm font-bold text-slate-600 mb-2">מספר תלמידים בקבוצה</label>
                     <select className="w-full p-4 rounded-xl border-2 border-slate-200 focus:border-indigo-500 bg-slate-50 text-lg font-bold" value={groupSizeInput} onChange={(e) => setGroupSizeInput(e.target.value)}>
                       {[2,3,4,5,6].map(n => <option key={n} value={n}>{n} תלמידים</option>)}
                     </select>
                  </div>
                </div>
                <div className="bg-slate-50 rounded-2xl p-6 border-2 border-slate-100">
                  <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2 mb-6"><Users className="w-6 h-6 text-indigo-600" /> ממתינים ({roomData.players.length})</h3>
                  <div className="flex flex-wrap gap-3">
                      {roomData.players.map((p, i) => <span key={i} className="bg-white px-4 py-2 rounded-full font-bold shadow-sm border border-slate-200 flex items-center gap-2"><CheckCircle2 className="w-4 h-4 text-green-500" />{p.name}</span>)}
                      {roomData.players.length === 0 && <span className="w-full text-center py-8 text-slate-400 font-medium">מחכה לתלמידים...</span>}
                  </div>
                </div>
              </div>
              <div className="mt-10 pt-8 border-t border-slate-200 text-center">
                <button onClick={start} disabled={isLoading || roomData.players.length === 0} className="w-full md:w-auto px-12 py-5 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white rounded-2xl font-black text-2xl shadow-lg transition-transform transform hover:scale-105 disabled:opacity-50 flex justify-center items-center gap-3 mx-auto">
                  {isLoading ? <Loader2 className="w-8 h-8 animate-spin" /> : <><Play className="w-8 h-8" /> חלק לקבוצות והתחל משחק!</>}
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      if (role === 'student' && roomData?.status === 'lobby') return (
        <div className="min-h-[100dvh] flex items-center justify-center bg-slate-900 text-white p-4" dir="rtl">
            <div className="text-center p-8 bg-slate-800 rounded-3xl shadow-2xl max-w-md w-full border border-white/10 relative overflow-hidden">
              <Sparkles className="w-16 h-16 text-yellow-400 mx-auto mb-6 animate-pulse" />
              <h2 className="text-3xl font-black mb-4">היי {studentName}! 👋</h2>
              <p className="text-xl text-slate-300 mb-8 font-medium">נכנסת בהצלחה לחדר המשחק.<br/>מחכים שהמורה יתחיל...</p>
              <div className="flex justify-center"><Loader2 className="w-10 h-10 animate-spin text-blue-500" /></div>
            </div>
        </div>
      );

      if (roomData?.status === 'playing') {
        const myPlayer = role === 'student' ? roomData.players.find(p => p.id === user.uid) : null;
        const myGroup = myPlayer ? roomData.groups.find(g => g.id === myPlayer.groupId) : null;
        const c = myGroup ? GROUP_COLORS[myGroup.colorIndex] : null;

        return (
          <div className="min-h-screen bg-slate-50 font-sans text-slate-800" dir="rtl">
            <div className={`p-4 shadow-md flex justify-between items-center ${role === 'teacher' ? 'bg-indigo-600 text-white' : (c ? `${c.bg} text-white` : 'bg-slate-800 text-white')}`}>
              <h1 className="text-xl md:text-2xl font-black tracking-wide">{role === 'teacher' ? 'מסך ניהול מרכזי' : `קבוצה ${myGroup?.name || ''}`}</h1>
              <div className="flex items-center gap-4">
                  <div className="bg-black/20 px-4 py-2 rounded-full font-bold">{roomData.topic}</div>
                  {role === 'student' && <div className="font-bold flex items-center gap-2"><Crown className="w-5 h-5 text-yellow-300" />ניקוד: {myGroup?.score || 0}</div>}
              </div>
            </div>

            <div className="max-w-6xl mx-auto p-4 md:p-6">
              {role === 'teacher' && (
                <div className="mb-8">
                  <div className="flex justify-between items-end mb-6">
                    <h2 className="text-2xl font-black text-slate-800">טבלת הקבוצות</h2>
                    <button onClick={startNextRound} disabled={isLoading} className="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-6 py-3 rounded-xl font-bold flex items-center gap-2 transition-colors">
                      {isLoading ? <Loader2 className="w-5 h-5 animate-spin" /> : <><PlusCircle className="w-5 h-5" /> סיבוב חדש</>}
                    </button>
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    {roomData.groups.sort((a,b) => b.score - a.score).map(g => {
                       const groupColor = GROUP_COLORS[g.colorIndex];
                       return (
                        <div key={g.id} className={`${groupColor.lightBg} p-4 rounded-2xl text-center border-2 ${groupColor.border} shadow-sm relative overflow-hidden`}>
                          <div className={`text-4xl font-black ${groupColor.text} mb-2`}>{g.score}</div>
                          <div className={`font-bold ${groupColor.text} text-lg mb-2`}>קבוצה {groupColor.name}</div>
                          <div className="text-sm font-medium leading-relaxed">{g.members.join(' • ')}</div>
                        </div>
                      )
                    })}
                  </div>
                </div>
              )}

              <div className="mt-8">
                  <h2 className="text-2xl font-black mb-6 text-center text-slate-800">מצאו את המילה הפולשת!</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {roomData.wordSets.map((set, idx) => {
                      const solved = set.status === 'solved';
                      const solver = solved ? roomData.groups.find(g => g.id === set.solvedBy) : null;
                      const solverColor = solver ? GROUP_COLORS[solver.colorIndex] : null;

                      return (
                        <div key={set.id} className={`bg-white rounded-2xl shadow-sm border-2 overflow-hidden transition-all duration-300 ${solved ? (solverColor ? solverColor.border : 'border-slate-300') : 'border-slate-200 hover:border-indigo-300 hover:shadow-md'}`}>
                          <div className="p-4 bg-slate-50 flex justify-between items-center border-b border-slate-100">
                            <span className="font-bold text-slate-500">סט {idx + 1}</span>
                            {solved && solverColor && <span className={`font-bold text-sm px-3 py-1 rounded-full ${solverColor.lightBg} ${solverColor.text}`}>נפתר ע"י קבוצה {solverColor.name}</span>}
                          </div>
                          <div className="p-6">
                            {solved ? (
                              <div className="text-center py-4">
                                <CheckCircle2 className={`w-12 h-12 mx-auto mb-3 ${solverColor ? solverColor.text : 'text-slate-400'}`} />
                                <div className="text-xl font-bold text-slate-700">הפולש היה: <span className="text-red-500 font-black">{set.intruder}</span></div>
                              </div>
                            ) : (
                              <div className="grid grid-cols-2 gap-3">
                                {set.words.map((w, i) => (
                                  <button key={i} id={`btn-${set.id}-${w}`} onClick={() => role === 'student' && solve(set.id, w, set.intruder)} disabled={role !== 'student'} className={`p-4 rounded-xl font-bold text-lg border-2 transition-all duration-200 ${role === 'student' ? 'bg-white border-indigo-100 text-indigo-900 hover:border-indigo-500 hover:bg-indigo-50 shadow-sm' : 'bg-slate-50 border-slate-200 text-slate-700 cursor-default'}`}>
                                    {w}
                                  </button>
                                ))}
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
